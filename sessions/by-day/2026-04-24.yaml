    description: "Join this session to discuss building data agents with ADK and MCP. Learn how these integrations standardize data connections, removing the need for custom connectors. We’ll explore creating agents that seamlessly access BigQuery for data analysis and insights. The group will review how to implement AgentOps for deep observability into performance and cost with just one line of code."
