  - title: "Always-on agentic life cycle: Connecting the development environment directly to production"
    description: "The traditional software development life cycle (SDLC) is linear, but the agentic SDLC is circular. We propose a harness-first approach that builds durable deep agents in production and connects them directly to local Google Antigravity and Gemini CLI environments. This session demonstrates how a production agent running in a hardened harness with sub-agent swarms serves as a local collaborator. Using Model Context Protocol (MCP) and the Agent2Agent protocol, this approach brings live enterprise telemetry into your inner loop. Join us and observe as we bootstrap a project from a production harness, use it to refactor code locally, and deploy changes that the agent then monitors in the background."
