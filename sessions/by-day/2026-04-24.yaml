    description: "The modern warehouse is no longer a solo act—it’s a chaotic mix of humans, AI agents, and heterogeneous robot fleets from different vendors. The challenge isn't just automation; it's multi-agent orchestration. In this lightning talk, discover how industry leaders leverage Google Cloud to power digital twins that simulate their entire operations. We’ll explore how this agentic architecture processes millions of operations, assigning the right task to the right agent—whether it’s a human picker, a third-party AMR, or a conveyor system—in real-time. Hear about the blueprint for building a digital nervous system that adapts instantly to traffic, demand spikes, and resource availability."
