<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Cloud Next 2026, Session evolution player</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <style>
    :root {
      --blue: #1a73e8;
      --blue-dark: #1557b0;
      --blue-light: #e8f0fe;
      --gray-050: #f8fbff;
      --gray-100: #f8f9fa;
      --gray-200: #e8eaed;
      --gray-300: #d2d7de;
      --gray-500: #80868b;
      --gray-700: #3c4043;
      --gray-900: #202124;
      --green: #34a853;
      --yellow: #fbbc04;
      --orange: #f29900;
      --red: #ea4335;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Google Sans', 'Segoe UI', Roboto, Arial, sans-serif;
      color: var(--gray-900);
      background: linear-gradient(180deg, #eef4ff 0%, #f7f9fc 220px, white 220px);
    }
    a { color: var(--blue); }
    header {
      padding: 28px 20px 18px;
      color: white;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
    }
    header h1 { margin: 0; font-size: clamp(1.6rem, 4vw, 2.3rem); }
    header p { margin: 8px 0 0; max-width: 840px; opacity: .92; }
    .header-links { margin-top: 10px; display: flex; gap: 12px; flex-wrap: wrap; font-size: .95rem; }
    .header-links a { color: white; }
    main {
      max-width: 1360px;
      margin: 0 auto;
      padding: 18px;
    }
    .toolbar, .viewer-shell {
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(26,115,232,.08);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(32,33,36,.08);
    }
    .toolbar {
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(260px, 1.4fr) auto auto;
      gap: 12px;
      align-items: center;
    }
    .toolbar input, .toolbar select {
      width: 100%;
      border: 1px solid var(--gray-200);
      border-radius: 999px;
      padding: 12px 14px;
      font-size: .95rem;
      background: white;
    }
    .checkbox-row { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .layout {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 22px;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 16px;
      font-size: .9rem;
      font-weight: 600;
      color: var(--gray-700);
      border-bottom: 1px solid var(--gray-200);
      background: var(--gray-050);
    }
    #session-list {
      max-height: 74vh;
      overflow: auto;
      padding: 8px;
    }
    .session-list-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px 12px 11px;
      border: 1px solid transparent;
      border-radius: 16px;
      background: transparent;
      cursor: pointer;
      margin-bottom: 6px;
    }
    .session-list-item:hover, .session-list-item.selected {
      background: var(--blue-light);
      border-color: rgba(26,115,232,.15);
    }
    .session-list-title { font-weight: 600; line-height: 1.3; }
    .session-list-meta { margin-top: 4px; color: var(--gray-500); font-size: .82rem; }
    .viewer-shell { padding: 16px; }
    .viewer-controls {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    #play-btn {
      border: none;
      background: var(--blue);
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    #snapshot-slider { width: 100%; }
    .snapshot-label {
      font-size: .9rem;
      color: var(--gray-700);
      min-width: 130px;
      text-align: right;
    }
    .playback-hint {
      font-size: .82rem;
      color: var(--gray-500);
      white-space: nowrap;
    }
    #filmstrip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(18px, 1fr));
      gap: 6px;
      margin-bottom: 16px;
    }
    .film-cell {
      position: relative;
      height: 62px;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      background: #f0f3f7;
      padding: 0;
      overflow: hidden;
      cursor: pointer;
    }
    .film-cell.active { outline: 3px solid rgba(26,115,232,.25); }
    .film-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(26,115,232,.55), rgba(26,115,232,.95));
      transition: height .35s ease;
    }
    .film-cell.full .film-fill { background: linear-gradient(180deg, #f28b82, var(--red)); }
    .film-cell.limited .film-fill { background: linear-gradient(180deg, #fde293, var(--orange)); }
    .film-cell.open .film-fill, .film-cell.filling .film-fill { background: linear-gradient(180deg, #8ab4f8, var(--blue)); }
    .film-cell.missing { background: repeating-linear-gradient(135deg, #f5f5f5, #f5f5f5 8px, #eceff1 8px, #eceff1 16px); }
    .viewer-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(260px, .8fr);
      gap: 14px;
      margin-bottom: 14px;
    }
    .card {
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      padding: 16px;
      background: white;
    }
    .card-label, .eyebrow {
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: .74rem;
      font-weight: 700;
      color: var(--gray-500);
    }
    .viewer-topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }
    .session-title { margin: 4px 0 6px; font-size: clamp(1.3rem, 3vw, 2rem); line-height: 1.15; }
    .session-title.animate-in { animation: rise .22s ease; }
    .flash-in { animation: flashIn .55s ease; }
    @keyframes rise {
      from { opacity: .2; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes flashIn {
      0% { background: rgba(26,115,232,.16); transform: translateY(4px); }
      100% { background: transparent; transform: translateY(0); }
    }
    .session-subtitle { color: var(--gray-500); font-size: .9rem; }
    .snapshot-badge {
      white-space: nowrap;
      border-radius: 999px;
      background: var(--blue-light);
      color: var(--blue-dark);
      padding: 10px 12px;
      font-weight: 600;
      font-size: .88rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      border: 1px solid var(--gray-200);
      border-radius: 16px;
      padding: 10px 12px;
      background: var(--gray-050);
    }
    .stat-card span { display: block; font-size: .8rem; color: var(--gray-500); }
    .stat-card strong { display: block; margin-top: 3px; font-size: 1.1rem; }
    .meta-row, .fill-meta, .muted { color: var(--gray-500); }
    .fill-wrap { margin-top: 14px; }
    .fill-header { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 8px; font-weight: 600; }
    .fill-track {
      position: relative;
      height: 16px;
      background: #edf1f4;
      border-radius: 999px;
      overflow: hidden;
    }
    .fill-bar {
      position: relative;
      z-index: 2;
      height: 100%;
      background: linear-gradient(90deg, #8ab4f8, var(--blue));
      transition: width .7s ease;
      border-radius: 999px;
    }
    .fill-bar-prev {
      position: absolute;
      inset: 0 auto 0 0;
      z-index: 1;
      background: rgba(95,99,104,.28);
      border-radius: 999px;
      transition: width .7s ease;
    }
    .fill-bar.full { background: linear-gradient(90deg, #f28b82, var(--red)); }
    .fill-bar.limited { background: linear-gradient(90deg, #fde293, var(--orange)); }
    .fill-meta { margin-top: 8px; font-size: .9rem; }
    .speaker-list {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .speaker-chip {
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
      border: 1px solid var(--gray-200);
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--gray-050);
    }
    .speaker-chip small { color: var(--gray-500); }
    .speaker-chip.added {
      background: rgba(52,168,83,.10);
      border-color: rgba(52,168,83,.28);
      animation: rise .24s ease;
    }
    .speaker-chip.removed {
      background: rgba(234,67,53,.08);
      border-color: rgba(234,67,53,.18);
      opacity: .78;
    }
    .speaker-chip.unchanged {
      background: var(--gray-050);
    }
    .speaker-chip .delta-tag {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .speaker-chip.added .delta-tag { color: var(--green); }
    .speaker-chip.removed .delta-tag { color: var(--red); }
    .change-list { margin: 10px 0 0 18px; padding: 0; }
    .change-list li { margin: 0 0 8px; }
    .delta-grid {
      display: grid;
      grid-template-columns: minmax(0,1fr) 40px minmax(0,1fr);
      gap: 12px;
      align-items: stretch;
      margin-bottom: 14px;
    }
    .delta-col {
      border: 1px solid var(--gray-200);
      border-radius: 18px;
      padding: 14px;
      background: var(--gray-050);
    }
    .delta-col.current.changed {
      border-color: rgba(26,115,232,.22);
      box-shadow: 0 0 0 3px rgba(26,115,232,.08);
    }
    .delta-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-500);
      font-size: 1.3rem;
      font-weight: 700;
    }
    .delta-title {
      margin-top: 6px;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .delta-meta {
      margin-top: 8px;
      font-size: .88rem;
      color: var(--gray-500);
    }
    .title-history {
      list-style: none;
      margin: 12px 0 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }
    .title-history li {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--gray-200);
    }
    .title-history li:first-child { border-top: none; padding-top: 0; }
    .title-history strong { color: var(--gray-700); }
    .empty-state, .missing-note {
      padding: 24px;
      border-radius: 18px;
      background: var(--gray-050);
      color: var(--gray-500);
      text-align: center;
    }
    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
      #session-list { max-height: 280px; }
      .viewer-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr; }
      .snapshot-label { text-align: left; }
      .viewer-controls { grid-template-columns: 1fr; }
      .playback-hint { white-space: normal; }
    }
    @media (max-width: 640px) {
      main { padding: 12px; }
      .title-history li { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .viewer-controls { grid-template-columns: 1fr; }
      .delta-grid { grid-template-columns: 1fr; }
      .delta-arrow { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Session evolution player</h1>
    <p>Scrub through Google Cloud Next 2026 snapshots and watch how session titles, speakers, and seat fullness changed over time.</p>
    <div class="header-links">
      <a href="./index.html">Session explorer</a>
      <a href="./changelog.html">Changelog</a>
      <a href="./insights.html">Insights</a>
    </div>
  </header>
  <main>
    <section class="toolbar">
      <input id="query" type="text" placeholder="Search title, speaker, company, or session id">
      <select id="sort">
        <option value="churn">Sort by overall churn</option>
        <option value="title">Sort by title changes</option>
        <option value="speakers">Sort by speaker changes</option>
        <option value="fullness">Sort by fullness changes</option>
        <option value="recent">Sort by most recent</option>
        <option value="alpha">Sort A → Z</option>
      </select>
      <label class="checkbox-row"><input id="changed-only" type="checkbox" checked> Only sessions with visible changes</label>
    </section>

    <div class="layout">
      <aside class="panel">
        <div class="panel-header"><span id="results-count">0 sessions</span></div>
        <div id="session-list"></div>
      </aside>

      <section class="viewer-shell">
        <div class="viewer-controls">
          <button id="play-btn" type="button">Play</button>
          <input id="snapshot-slider" type="range" min="0" max="0" value="0">
          <div id="snapshot-label" class="snapshot-label">Loading…</div>
        <div id="playback-hint" class="playback-hint">Play to animate changes</div>
        </div>
        <div id="filmstrip"></div>
        <div id="viewer" class="viewer empty"><div class="empty-state">Loading session history…</div></div>
      </section>
    </div>
  </main>
  <script type="module" src="./website/session-timeline.mjs"></script>
</body>
</html>
